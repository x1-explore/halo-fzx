<!doctype html>
<html lang="zh-CN" data-theme="light" class="fzx-theme-light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录预览 · 方舟星系</title>
  <link rel="stylesheet" href="templates/assets/css/style.css">
</head>
<body class="fzx-login-page">
  <canvas id="fzx-starfield" aria-hidden="true"></canvas>
  <div class="fzx-login-shell">
    <div class="fzx-login-card">
      <div class="fzx-login-brand">
        <div class="fzx-login-avatar"><img src="https://avatars.githubusercontent.com/u/194214108?v=4" alt="FZX"></div>
        <div class="fzx-login-title">FZX · 方舟星系</div>
        <p class="fzx-login-subtitle">欢迎回到星港</p>
      </div>
      <div class="fzx-login-alert fzx-login-alert--error" style="display:flex;">登录失败，请检查账号或密码</div>
      <form class="fzx-login-form" action="#" method="post">
        <label class="fzx-login-label" for="login-username">用户名 / 邮箱</label>
        <div class="fzx-login-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input id="login-username" name="username" type="text" placeholder="输入用户名或邮箱" />
        </div>
        <label class="fzx-login-label" for="login-password">密码</label>
        <div class="fzx-login-field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input id="login-password" name="password" type="password" placeholder="输入密码" />
        </div>
        <div class="fzx-login-remember">
          <label><input type="checkbox" name="remember-me" value="true" /> 记住我</label>
          <a class="fzx-login-link" href="#">注册新账户</a>
        </div>
        <button class="fzx-btn fzx-btn-primary fzx-login-submit" type="button">进入星港</button>
      </form>
      <div class="fzx-login-actions">
        <a class="fzx-login-link" href="#">← 返回首页</a>
        <a class="fzx-login-link" href="#">进入控制台</a>
      </div>
    </div>
  </div>
  <script defer src="templates/assets/js/main.js"></script>
</body>
</html>
