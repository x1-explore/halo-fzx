apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-fzx-setting
spec:
  forms:
    - group: global
      label: 全局设置
      formSchema:
        - $formkit: text
          name: footer_info
          label: 页脚版权信息
          value: "Powered by Halo · FZX 方舟星系"
        - $formkit: text
          name: site_since
          label: 建站时间 (如 2024)
          value: ""
        - $formkit: checkbox
          name: show_scroll_button
          label: 显示返回顶部按钮
          value: true
        - $formkit: checkbox
          name: show_reading_progress
          label: 显示阅读进度条
          value: true
    - group: hero
      label: 首页横幅
      formSchema:
        - $formkit: select
          name: style
          label: 横幅样式
          value: "full"
          options:
            - label: 全屏星空
              value: "full"
            - label: 常规
              value: "normal"
        - $formkit: text
          name: title
          label: 横幅标题 (留空使用站点名称)
          value: ""
        - $formkit: text
          name: subtitle
          label: 横幅副标题 (留空使用站点副标题)
          value: ""
    - group: post
      label: 文章设置
      formSchema:
        - $formkit: checkbox
          name: show_toc
          label: 显示目录
          value: true
        - $formkit: checkbox
          name: show_upvote
          label: 显示点赞按钮
          value: true
        - $formkit: checkbox
          name: show_share
          label: 显示分享按钮
          value: false
    - group: branding
      label: 品牌与头像
      formSchema:
        - $formkit: text
          name: site_title
          label: 自定义站点名称（留空则使用站点标题）
          value: ""
          help: 用于导航栏、页脚等位置
        - $formkit: text
          name: site_subtitle
          label: 自定义站点副标题（留空则使用站点副标题）
          value: ""
        - $formkit: text
          name: logo_url
          label: 自定义 Logo 地址（留空使用站点 Logo）
          value: ""
        - $formkit: text
          name: avatar_url
          label: 自定义头像地址（留空使用站点 Logo 或默认图标）
          value: ""
    - group: appearance
      label: 外观
      formSchema:
        - $formkit: select
          name: color_scheme
          label: 默认配色
          value: "dark"
          options:
            - label: 暗色
              value: "dark"
            - label: 亮色
              value: "light"
            - label: 跟随系统
              value: "system"
        - $formkit: checkbox
          name: show_theme_toggle
          label: 显示主题切换按钮
          value: true
