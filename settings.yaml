apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-fzx-setting
spec:
  forms:
    - group: global
      label: 全局设置
      formSchema:
        - $formkit: text
          name: footer_info
          label: 页脚版权信息
          value: "Powered by Halo · FZX 方舟星系"
        - $formkit: text
          name: site_since
          label: 建站时间 (如 2024)
          value: ""
        - $formkit: checkbox
          name: show_scroll_button
          label: 显示返回顶部按钮
          value: true
        - $formkit: checkbox
          name: show_reading_progress
          label: 显示阅读进度条
          value: true
    - group: hero
      label: 首页横幅
      formSchema:
        - $formkit: select
          name: style
          label: 横幅样式
          value: "full"
          options:
            - label: 全屏星空
              value: "full"
            - label: 常规
              value: "normal"
        - $formkit: text
          name: title
          label: 横幅标题 (留空使用站点名称)
          value: ""
        - $formkit: text
          name: subtitle
          label: 横幅副标题 (留空使用站点副标题)
          value: ""
        - $formkit: text
          name: badge_text
          label: 横幅角标文案（留空则不显示）
          value: ""
    - group: post
      label: 文章设置
      formSchema:
        - $formkit: checkbox
          name: show_toc
          label: 显示目录
          value: true
        - $formkit: checkbox
          name: show_upvote
          label: 显示点赞按钮
          value: true
        - $formkit: checkbox
          name: show_share
          label: 显示分享按钮
          value: false
    - group: branding
      label: 品牌与头像
      formSchema:
        - $formkit: text
          name: site_title
          label: 自定义站点名称（留空则使用站点标题）
          value: ""
          help: 用于导航栏、页脚等位置
        - $formkit: text
          name: site_subtitle
          label: 自定义站点副标题（留空则使用站点副标题）
          value: ""
        - $formkit: text
          name: logo_url
          label: 自定义 Logo 地址（留空使用站点 Logo）
          value: ""
        - $formkit: text
          name: avatar_url
          label: 自定义头像地址（留空使用站点 Logo 或默认图标）
          value: ""
    - group: appearance
      label: 外观
      formSchema:
        - $formkit: select
          name: color_scheme
          label: 默认配色
          value: "light"
          options:
            - label: 暗色
              value: "dark"
            - label: 亮色
              value: "light"
            - label: 跟随系统
              value: "system"
        - $formkit: checkbox
          name: show_theme_toggle
          label: 显示主题切换按钮
          value: true
    - group: footer
      label: 页脚与导航
      formSchema:
        - $formkit: text
          name: footer_badge
          label: 页脚标语
          value: "✦ 方舟星系 · 浪漫与科技的交汇 ✦"
        - $formkit: text
          name: footer_nav_title
          label: 导航列标题
          value: "导航"
        - $formkit: repeater
          name: footer_nav_links
          label: 导航链接（留空使用默认）
          value:
            - label: 首页
              url: "/"
              icon: "🏠"
            - label: 归档
              url: "/archives"
              icon: "🗂️"
            - label: 分类
              url: "/categories"
              icon: "📂"
            - label: 标签
              url: "/tags"
              icon: "🔖"
          children:
            - $formkit: text
              name: label
              label: 文案
            - $formkit: text
              name: url
              label: 链接
            - $formkit: text
              name: icon
              label: 图标（可填 emoji 或短文字）
        - $formkit: text
          name: footer_more_title
          label: 更多列标题
          value: "更多"
        - $formkit: repeater
          name: footer_more_links
          label: 更多链接（留空使用默认）
          value:
            - label: 登录
              url: "/login"
              icon: "→"
            - label: 控制台
              url: "/console"
              icon: "⚙️"
            - label: 主题源码
              url: "https://github.com/x1-explore/halo-fzx"
              icon: "★"
          children:
            - $formkit: text
              name: label
              label: 文案
            - $formkit: text
              name: url
              label: 链接
            - $formkit: text
              name: icon
              label: 图标（可填 emoji 或短文字）
    - group: page
      label: 单页
      formSchema:
        - $formkit: checkbox
          name: center_layout
          label: 单页内容居中显示
          help: 开启后单页正文会居中且收窄宽度，同时隐藏侧边栏；关闭则与文章页一致
          value: true
        - $formkit: checkbox
          name: show_sidebar
          label: 显示侧边栏
          value: false
