<footer class="fzx-footer" th:fragment="footer" xmlns:th="https://www.thymeleaf.org"
        th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                 brandingSubtitle = ${!#strings.isEmpty(theme.config.branding.site_subtitle) ? theme.config.branding.site_subtitle : site.subtitle},
                 footerCfg = ${theme.config.footer},
                 footerBadge = ${footerCfg != null ? footerCfg.footer_badge : null},
                 footerNavLinks = ${footerCfg != null ? footerCfg.footer_nav_links : null},
                 footerMoreLinks = ${footerCfg != null ? footerCfg.footer_more_links : null},
                 footerNavTitle = ${!#strings.isEmpty(footerCfg != null ? footerCfg.footer_nav_title : null) ? footerCfg.footer_nav_title : '导航'},
                 footerMoreTitle = ${!#strings.isEmpty(footerCfg != null ? footerCfg.footer_more_title : null) ? footerCfg.footer_more_title : '更多'}">
  <div class="fzx-container">
    <div class="fzx-footer-grid">

      <!-- Brand column -->
      <div>
        <div class="fzx-footer-brand-name" th:text="${brandingTitle}">FZX</div>
        <p class="fzx-footer-brand-desc" th:text="${brandingSubtitle}">Where Romanticism Meets Technology</p>
        <p class="fzx-footer-brand-desc" style="margin-top:0.5rem; font-size:0.75rem; opacity:0.6;"
           th:if="${!#strings.isEmpty(footerBadge)}"
           th:text="${footerBadge}">
          ✦ &nbsp;方舟星系 · 浪漫与科技的交汇&nbsp; ✦
        </p>
      </div>

      <!-- Navigation links -->
      <div>
        <div class="fzx-footer-col-title" th:text="${footerNavTitle}">导航</div>
        <ul class="fzx-footer-links">
          <th:block th:if="${!#lists.isEmpty(footerNavLinks)}">
            <li th:each="item : ${footerNavLinks}"
                th:with="rawUrl = ${item.url != null ? item.url : '/'},
                         lower = ${#strings.toLowerCase(rawUrl)},
                         safeUrl = ${lower.startsWith('http://') or lower.startsWith('https://') or lower.startsWith('/') or lower.startsWith('mailto:') ? rawUrl : '/'}">
              <a class="fzx-footer-link"
                 th:href="${safeUrl}"
                 th:attr="rel=${safeUrl != null and #strings.startsWith(#strings.toLowerCase(safeUrl), 'http') ? 'noopener' : null}">
                <span class="fzx-footer-link-icon" th:if="${!#strings.isEmpty(item.icon)}" th:text="${item.icon}">★</span>
                <span th:text="${item.label}">链接</span>
              </a>
            </li>
          </th:block>
          <th:block th:unless="${!#lists.isEmpty(footerNavLinks)}">
            <li><a class="fzx-footer-link" th:href="@{/}">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </span>首页</a></li>
            <li><a class="fzx-footer-link" th:href="@{/archives}">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
              </span>归档</a></li>
            <li><a class="fzx-footer-link" th:href="@{/categories}">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              </span>分类</a></li>
            <li><a class="fzx-footer-link" th:href="@{/tags}">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              </span>标签</a></li>
          </th:block>
        </ul>
      </div>

      <!-- Extra links -->
      <div>
        <div class="fzx-footer-col-title" th:text="${footerMoreTitle}">更多</div>
        <ul class="fzx-footer-links">
          <th:block th:if="${!#lists.isEmpty(footerMoreLinks)}">
            <li th:each="item : ${footerMoreLinks}"
                th:with="rawUrl = ${item.url != null ? item.url : '/'},
                         lower = ${#strings.toLowerCase(rawUrl)},
                         safeUrl = ${lower.startsWith('http://') or lower.startsWith('https://') or lower.startsWith('/') or lower.startsWith('mailto:') ? rawUrl : '/'}">
              <a class="fzx-footer-link"
                 th:href="${safeUrl}"
                 th:attr="rel=${safeUrl != null and #strings.startsWith(#strings.toLowerCase(safeUrl), 'http') ? 'noopener' : null}">
                <span class="fzx-footer-link-icon" th:if="${!#strings.isEmpty(item.icon)}" th:text="${item.icon}">★</span>
                <span th:text="${item.label}">链接</span>
              </a>
            </li>
          </th:block>
          <th:block th:unless="${!#lists.isEmpty(footerMoreLinks)}">
            <li><a class="fzx-footer-link" href="/login" sec:authorize="isAnonymous()">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              </span>登录</a></li>
            <li><a class="fzx-footer-link" href="/console" sec:authorize="isAuthenticated()" target="_blank" rel="noopener">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </span>控制台</a></li>
            <li><a class="fzx-footer-link" href="https://halo.run" target="_blank" rel="noopener">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
              </span>Halo</a></li>
            <li><a class="fzx-footer-link" href="https://github.com/x1-explore/halo-fzx" target="_blank" rel="noopener">
              <span class="fzx-footer-link-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
              </span>主题源码</a></li>
          </th:block>
        </ul>
      </div>

    </div>

    <div class="fzx-footer-bottom">
      <span
        th:if="${!#strings.isEmpty(theme.config.global.footer_info)}"
        th:text="${theme.config.global.footer_info}"
      ></span>
      <span th:unless="${!#strings.isEmpty(theme.config.global.footer_info)}">
        Powered by <a href="https://halo.run" target="_blank" rel="noopener">Halo</a> &amp; FZX Theme
      </span>

      <span>
        &copy;
        <span th:if="${!#strings.isEmpty(theme.config.global.site_since)}"
              th:text="${theme.config.global.site_since} + ' - '"></span>
        <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2024</span>
        &nbsp;
        <span th:text="${brandingTitle}">Site</span>
      </span>
    </div>
  </div>
</footer>
