<aside class="fzx-sidebar" th:fragment="sidebar" xmlns:th="https://www.thymeleaf.org"
       th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                brandingSubtitle = ${!#strings.isEmpty(theme.config.branding.site_subtitle) ? theme.config.branding.site_subtitle : site.subtitle},
                brandingAvatar = ${
                  !#strings.isEmpty(theme.config.branding.avatar_url) ? theme.config.branding.avatar_url :
                  !#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url :
                  site.logo
                },
                contactCfg = ${theme.config.contact}">

  <!-- ── Profile / Site Info Widget ── -->
  <div class="fzx-widget">
    <div class="fzx-profile">
      <div class="fzx-profile-avatar-wrap">
        <img
          class="fzx-profile-avatar"
          th:src="${#strings.isEmpty(brandingAvatar) ? '/assets/images/logo.svg' : brandingAvatar}"
          th:alt="${brandingTitle}"
        />
      </div>
      <div class="fzx-profile-name" th:text="${brandingTitle}">FZX</div>
      <p class="fzx-profile-desc" th:text="${brandingSubtitle}">Where Romanticism Meets Technology</p>

      <!-- Social / Contact Links -->
      <div class="fzx-profile-social"
           th:if="${contactCfg != null and !#lists.isEmpty(contactCfg.social_links)}">
        <th:block th:each="link : ${contactCfg.social_links}"
                  th:with="rawUrl = ${link.url != null ? link.url : '#'},
                           lowerUrl = ${#strings.toLowerCase(rawUrl)},
                           safeUrl = ${lowerUrl.startsWith('http://') or lowerUrl.startsWith('https://') or lowerUrl.startsWith('mailto:') ? rawUrl : '#'},
                           isKnownType = ${link.type == 'email' or link.type == 'github' or link.type == 'twitter' or link.type == 'weibo' or link.type == 'bilibili' or link.type == 'telegram' or link.type == 'wechat' or link.type == 'youtube' or link.type == 'instagram' or link.type == 'linkedin' or link.type == 'rss'}">
          <a class="fzx-social-link"
             th:href="${safeUrl}"
             th:title="${link.label}"
             th:target="${lowerUrl.startsWith('mailto:') ? '_self' : '_blank'}"
             th:attr="rel=${not lowerUrl.startsWith('mailto:') ? 'noopener noreferrer' : null}">
            <!-- Email -->
            <th:block th:if="${link.type == 'email'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </th:block>
            <!-- GitHub -->
            <th:block th:if="${link.type == 'github'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
              </svg>
            </th:block>
            <!-- Twitter / X -->
            <th:block th:if="${link.type == 'twitter'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
              </svg>
            </th:block>
            <!-- Weibo -->
            <th:block th:if="${link.type == 'weibo'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
            </th:block>
            <!-- Bilibili -->
            <th:block th:if="${link.type == 'bilibili'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
                <line x1="17" y1="2" x2="12" y2="7"/>
                <line x1="7" y1="2" x2="12" y2="7"/>
                <polygon points="10 11 16 14.5 10 18 10 11"/>
              </svg>
            </th:block>
            <!-- Telegram -->
            <th:block th:if="${link.type == 'telegram'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </th:block>
            <!-- WeChat -->
            <th:block th:if="${link.type == 'wechat'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </th:block>
            <!-- YouTube -->
            <th:block th:if="${link.type == 'youtube'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
                <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
              </svg>
            </th:block>
            <!-- Instagram -->
            <th:block th:if="${link.type == 'instagram'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
              </svg>
            </th:block>
            <!-- LinkedIn -->
            <th:block th:if="${link.type == 'linkedin'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                <rect x="2" y="9" width="4" height="12"/>
                <circle cx="4" cy="4" r="2"/>
              </svg>
            </th:block>
            <!-- RSS -->
            <th:block th:if="${link.type == 'rss'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 11a9 9 0 0 1 9 9"/>
                <path d="M4 4a16 16 0 0 1 16 16"/>
                <circle cx="5" cy="19" r="1"/>
              </svg>
            </th:block>
            <!-- Custom / fallback -->
            <th:block th:unless="${isKnownType}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </th:block>
          </a>
        </th:block>
      </div>

    </div>
  </div>

  <!-- ── Recent Posts Widget ── -->
  <div class="fzx-widget" th:with="recentPosts = ${postFinder.list(1, 6)}">
    <h3 class="fzx-widget-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      最新文章
    </h3>
    <ul class="fzx-recent-list">
      <li th:each="post : ${recentPosts.items}">
        <a class="fzx-recent-item" th:href="${post.status.permalink}">
          <img
            th:if="${!#strings.isEmpty(post.spec.cover)}"
            class="fzx-recent-thumb"
            th:src="${post.spec.cover}"
            th:alt="${post.spec.title}"
          />
          <div class="fzx-recent-info">
            <div class="fzx-recent-title" th:text="${post.spec.title}">文章标题</div>
            <div class="fzx-recent-date" th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}">日期</div>
          </div>
        </a>
      </li>
    </ul>
    <div th:if="${recentPosts.total == 0}" class="fzx-empty" style="padding:1rem 0">
      <span style="color:var(--text-muted);font-size:0.82rem">暂无文章</span>
    </div>
  </div>

  <!-- ── Categories Widget ── -->
  <div class="fzx-widget" th:with="cats = ${categoryFinder.listAsTree()}">
    <h3 class="fzx-widget-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
      </svg>
      分类
    </h3>
    <ul class="fzx-cats-list">
      <th:block th:each="cat : ${cats}">
        <li class="fzx-cat-item" th:if="${(cat.status.postCount ?: 0) gt 0}">
          <a th:href="${cat.status.permalink}">
            <span th:text="${cat.spec.displayName}">分类</span>
            <span class="fzx-cat-count" th:text="${cat.status.postCount ?: 0}">0</span>
          </a>
        </li>
      </th:block>
    </ul>
    <div th:if="${#lists.isEmpty(cats)}" style="color:var(--text-muted);font-size:0.82rem;padding:0.5rem 0">
      暂无分类
    </div>
  </div>

  <!-- ── Tags Widget ── -->
  <div class="fzx-widget" th:with="tags = ${tagFinder.listAll()}">
    <h3 class="fzx-widget-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
        <line x1="7" y1="7" x2="7.01" y2="7"></line>
      </svg>
      标签云
    </h3>
    <div class="fzx-tag-cloud">
      <th:block th:each="tag : ${tags}">
        <a
          class="fzx-tag-cloud-item"
          th:if="${(tag.status.postCount ?: 0) gt 0}"
          th:href="${tag.status.permalink}"
          th:text="'#' + ${tag.spec.displayName}"
        >#标签</a>
      </th:block>
    </div>
    <div th:if="${#lists.isEmpty(tags)}" style="color:var(--text-muted);font-size:0.82rem">
      暂无标签
    </div>
  </div>

</aside>
