<th:block th:fragment="base-head(title)" xmlns:th="https://www.thymeleaf.org">
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2" />
  <title th:text="${title}">FZX 方舟星系</title>

  <!-- Favicon -->
  <link th:unless="${#strings.isEmpty(site.favicon)}" rel="icon" th:href="${site.favicon}" />

  <!-- 初始配色，优先使用本地偏好 → 主题设置 → 系统偏好，避免闪烁 -->
  <script th:inline="javascript">
    (function () {
      try {
        const storageKey = 'fzx-color-scheme';
        const saved = localStorage.getItem(storageKey);
        const setting = /*[[${theme.config.appearance.color_scheme}]]*/ 'dark';
        // Halo/Thymeleaf may serialize null as literal "null", normalize both cases
        const normalized = (!setting || setting === 'null' || setting === null) ? 'dark' : setting;
        const systemPrefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        const fallback = normalized === 'system' ? (systemPrefersLight ? 'light' : 'dark') : normalized;
        const mode = saved === 'light' || saved === 'dark' ? saved : fallback;
        const doc = document.documentElement;
        doc.setAttribute('data-theme', mode);
        doc.dataset.defaultTheme = normalized;
      } catch (err) {
        console.error('Theme init error', err);
      }
    })();
  </script>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

  <!-- Fonts: Playfair Display (romantic serif) + Inter (clean sans) + JetBrains Mono (tech) -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
  />

  <!-- Theme CSS -->
  <link
    rel="stylesheet"
    th:href="@{/assets/css/style.css?v={v}(v=${theme.spec.version})}"
  />

  <!-- Theme JS (deferred) -->
  <script defer th:src="@{/assets/js/main.js?v={v}(v=${theme.spec.version})}"></script>
</th:block>
