<header class="fzx-header" th:fragment="header" xmlns:th="https://www.thymeleaf.org"
        th:with="menu = ${menuFinder.getPrimary()},
                 brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                 brandingSubtitle = ${!#strings.isEmpty(theme.config.branding.site_subtitle) ? theme.config.branding.site_subtitle : site.subtitle},
                 brandingLogo = ${!#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url : site.logo}">
  <div class="fzx-container" style="width:100%">
    <div class="fzx-header-inner">

      <!-- ── Logo ── -->
        <a class="fzx-logo" th:href="@{/}">
          <img
          th:if="${!#strings.isEmpty(brandingLogo)}"
          th:src="${brandingLogo}"
          class="fzx-logo-img"
          th:alt="${brandingTitle}"
        />
        <span class="fzx-logo-text" th:text="${brandingTitle}">FZX</span>
      </a>

      <!-- ── Primary Navigation ── -->
      <nav aria-label="主导航">
        <ul class="fzx-nav">
          <!-- Dynamic menu from Halo backend -->
          <th:block th:if="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <li class="fzx-nav-item" th:each="item : ${menu.menuItems}">
              <a
                class="fzx-nav-link"
                th:href="@{${item.status.href}}"
                th:text="${item.status.displayName}"
                th:target="${item.spec.target?.value}"
              >菜单</a>
              <!-- Dropdown for children -->
              <ul class="fzx-nav-dropdown" th:if="${not #lists.isEmpty(item.children)}">
                <li th:each="child : ${item.children}">
                  <a
                    th:href="@{${child.status.href}}"
                    th:text="${child.status.displayName}"
                    th:target="${child.spec.target?.value}"
                  >子项</a>
                </li>
              </ul>
            </li>
          </th:block>

          <!-- Fallback static nav if no menu is configured -->
          <th:block th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <li class="fzx-nav-item"><a class="fzx-nav-link" th:href="@{/}">首页</a></li>
            <li class="fzx-nav-item"><a class="fzx-nav-link" th:href="@{/archives}">归档</a></li>
            <li class="fzx-nav-item"><a class="fzx-nav-link" th:href="@{/categories}">分类</a></li>
            <li class="fzx-nav-item"><a class="fzx-nav-link" th:href="@{/tags}">标签</a></li>
          </th:block>
        </ul>
      </nav>

      <!-- ── Actions ── -->
      <div class="fzx-header-actions">
        <th:block th:if="${theme.config.appearance.show_theme_toggle != false}">
          <button class="fzx-icon-btn fzx-theme-toggle" type="button" data-fzx-theme-toggle aria-label="切换主题">
            <svg class="fzx-theme-icon fzx-theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="fzx-theme-icon fzx-theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </th:block>

        <a
          sec:authorize="isAnonymous()"
          class="fzx-auth-btn"
          href="/login"
          th:classappend="${site.allowRegistration} ? 'fzx-auth-btn--with-register' : ''"
          th:title="${site.allowRegistration} ? '登录 / 注册' : '登录'"
          aria-label="登录或注册"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          <span class="fzx-auth-text" th:text="${site.allowRegistration} ? '登录 / 注册' : '登录'">登录</span>
          <span class="fzx-auth-badge" th:if="${site.allowRegistration}">可注册</span>
        </a>

        <!-- Search toggle -->
        <button id="fzx-search-btn" class="fzx-icon-btn" aria-label="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <!-- Login/Console for authenticated users -->
        <a
          sec:authorize="isAuthenticated()"
          href="/console"
          target="_blank"
          class="fzx-icon-btn"
          aria-label="控制台"
          title="控制台"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 17l6-6-6-6"></path>
            <line x1="12" y1="19" x2="20" y2="19"></line>
          </svg>
        </a>

        <!-- Mobile menu toggle -->
        <button id="fzx-menu-toggle" class="fzx-icon-btn fzx-menu-toggle" aria-label="菜单">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

    </div>
  </div>
</header>
