<!doctype html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
  <head>
    <th:block th:replace="~{modules/base-head :: base-head(
      title = ${'登录 - ' + (!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title)}
    )}" />
  </head>
  <body class="fzx-login-page">
    <!-- Starfield background -->
    <canvas id="fzx-starfield" aria-hidden="true"></canvas>

    <div class="fzx-login-shell"
         th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                  brandingSubtitle = ${!#strings.isEmpty(theme.config.branding.site_subtitle) ? theme.config.branding.site_subtitle : site.subtitle},
                  brandingLogo = ${!#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url : site.logo}">
      <div class="fzx-login-card fzx-reveal">
        <div class="fzx-login-brand">
          <div class="fzx-login-avatar" th:if="${!#strings.isEmpty(brandingLogo)}">
            <img th:src="${brandingLogo}" th:alt="${brandingTitle}" loading="lazy" />
          </div>
          <div class="fzx-login-title" th:text="${brandingTitle}">FZX 方舟星系</div>
          <p class="fzx-login-subtitle" th:text="${#strings.defaultString(brandingSubtitle, '欢迎回到星港')}">
            欢迎回到星港
          </p>
        </div>

        <div class="fzx-login-alert fzx-login-alert--error" th:if="${param.containsKey('error')}">
          登录失败，请检查账号或密码
        </div>
        <div class="fzx-login-alert fzx-login-alert--info" th:if="${param.containsKey('logout') and !param.containsKey('error')}">
          已安全退出登录
        </div>
        <div class="fzx-login-alert fzx-login-alert--info" th:if="${param.containsKey('registered') and !param.containsKey('error')}">
          注册成功，请登录
        </div>

        <form class="fzx-login-form" th:action="@{/login}" method="post">
          <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <label class="fzx-login-label" for="login-username">用户名 / 邮箱</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input id="login-username" name="username" type="text" autocomplete="username" required placeholder="输入用户名或邮箱" />
          </div>

          <label class="fzx-login-label" for="login-password">密码</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required placeholder="输入密码" />
          </div>

          <div class="fzx-login-remember">
            <label>
              <input type="checkbox" name="remember-me" value="true" />
              记住我
            </label>
            <a class="fzx-login-link" th:href="@{/password-reset}">忘记密码？</a>
          </div>

          <button class="fzx-btn fzx-btn-primary fzx-login-submit" type="submit">登录</button>
        </form>

        <div class="fzx-login-actions">
          <a class="fzx-login-link" th:href="@{/}">← 返回首页</a>
          <a class="fzx-login-link" th:if="${site.allowRegistration}" th:href="@{/signup}">注册新账号</a>
          <a class="fzx-login-link" th:href="@{/console}" sec:authorize="isAuthenticated()">进入控制台</a>
        </div>
      </div>
    </div>
  </body>
</html>
