<!doctype html>
<html xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{modules/base-head :: base-head(
      title = ${'重置密码 - ' + (!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title)}
    )}" />
  </head>
  <body class="fzx-login-page">
    <canvas id="fzx-starfield" aria-hidden="true"></canvas>

    <div class="fzx-login-shell"
         th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                  brandingLogo  = ${!#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url : site.logo}">
      <div class="fzx-login-card fzx-reveal">

        <div class="fzx-login-brand">
          <div class="fzx-login-avatar" th:if="${!#strings.isEmpty(brandingLogo)}">
            <img th:src="${brandingLogo}" th:alt="${brandingTitle}" loading="lazy" />
          </div>
          <div class="fzx-login-title">重置密码</div>
        </div>

        <!-- Rate limit error -->
        <div class="fzx-login-alert fzx-login-alert--error"
             th:if="${error != null and error == 'rate_limit_exceeded'}">
          操作过于频繁，请稍后重试
        </div>

        <form class="fzx-login-form"
              th:action="@{/password-reset/email/{t}(t=${resetToken})}"
              th:object="${form}"
              method="post">
          <input th:if="${_csrf != null}" type="hidden"
                 th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <!-- Validation errors -->
          <div class="fzx-login-alert fzx-login-alert--error"
               th:if="${#fields.hasErrors('password')}">
            密码格式不正确（至少5位）
          </div>
          <div class="fzx-login-alert fzx-login-alert--error"
               th:if="${#fields.hasErrors('confirmPassword')}">
            两次输入的密码不一致
          </div>

          <label class="fzx-login-label" for="password">新密码</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="password" th:field="*{password}" type="password"
                   autocomplete="new-password" required minlength="5" placeholder="输入新密码（至少5位）" />
          </div>

          <label class="fzx-login-label" for="confirmPassword">确认新密码</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="confirmPassword" th:field="*{confirmPassword}" type="password"
                   autocomplete="new-password" required minlength="5" placeholder="再次输入新密码" />
          </div>

          <button class="fzx-btn fzx-btn-primary fzx-login-submit" type="submit">重置密码</button>
        </form>

        <div class="fzx-login-actions">
          <a class="fzx-login-link" th:href="@{/login}">← 返回登录</a>
        </div>

      </div>
    </div>
  </body>
</html>
