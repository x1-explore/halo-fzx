<!doctype html>
<html xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{modules/base-head :: base-head(
      title = ${'找回密码 - ' + (!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title)}
    )}" />
  </head>
  <body class="fzx-login-page">
    <canvas id="fzx-starfield" aria-hidden="true"></canvas>

    <div class="fzx-login-shell"
         th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                  brandingLogo  = ${!#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url : site.logo}">
      <div class="fzx-login-card fzx-reveal">

        <div class="fzx-login-brand">
          <div class="fzx-login-avatar" th:if="${!#strings.isEmpty(brandingLogo)}">
            <img th:src="${brandingLogo}" th:alt="${brandingTitle}" loading="lazy" />
          </div>
          <div class="fzx-login-title"
               th:text="${sent != null and sent} ? '邮件已发送' : '找回密码'">找回密码</div>
        </div>

        <!-- Success state -->
        <div class="fzx-login-alert fzx-login-alert--info"
             th:if="${sent != null and sent}">
          重置密码邮件已发送，请检查您的邮箱
        </div>

        <!-- Invalid reset token redirect -->
        <div class="fzx-login-alert fzx-login-alert--error"
             th:if="${param.error != null and !#lists.isEmpty(param.error) and param.error[0] == 'invalid_reset_token'}">
          重置链接已失效，请重新申请
        </div>

        <!-- Rate limit or other error from model attribute -->
        <div class="fzx-login-alert fzx-login-alert--error"
             th:if="${error != null and error == 'rate_limit_exceeded'}">
          操作过于频繁，请稍后重试
        </div>

        <form th:unless="${sent != null and sent}"
              class="fzx-login-form"
              th:action="@{/password-reset/email}"
              method="post">
          <input th:if="${_csrf != null}" type="hidden"
                 th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <label class="fzx-login-label" for="send-email">电子邮箱</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input id="send-email" name="email" type="email"
                   autocomplete="email" required placeholder="输入注册邮箱" />
          </div>

          <button class="fzx-btn fzx-btn-primary fzx-login-submit" type="submit">提交</button>
        </form>

        <div class="fzx-login-actions">
          <a class="fzx-login-link" th:href="@{/login}">← 返回登录</a>
        </div>

      </div>
    </div>
  </body>
</html>
