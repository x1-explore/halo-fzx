<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(
    title       = ${post.spec.title} + ' - ' + ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
    hero        = ~{::hero},
    content     = ~{::content},
    head        = null,
    footer      = ~{::footer},
    sidebar     = ~{::sidebar},
    contentClass= null
  )}"
>

  <!-- ── Cover Hero ── -->
  <th:block th:fragment="hero">
    <div
      th:if="${!#strings.isEmpty(post.spec.cover)}"
      class="fzx-post-hero"
      th:style="|background-image: url('${post.spec.cover}')|"
    ></div>
    <div class="fzx-header-spacer" th:unless="${!#strings.isEmpty(post.spec.cover)}"></div>
  </th:block>

  <!-- ── TOC Sidebar ── -->
  <th:block th:fragment="sidebar">
    <aside class="fzx-sidebar">

      <!-- Table of Contents -->
      <div
        class="fzx-widget fzx-toc-widget"
        th:if="${theme.config.post.show_toc != false}"
      >
        <h3 class="fzx-widget-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          目录
        </h3>
        <!-- JS populates this -->
        <div class="fzx-toc-scroll">
          <p style="color:var(--text-muted);font-size:0.8rem">加载中...</p>
        </div>
      </div>

      <!-- Categories Widget -->
      <div class="fzx-widget" th:with="cats = ${categoryFinder.listAsTree()}">
        <h3 class="fzx-widget-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          分类
        </h3>
        <ul class="fzx-cats-list">
          <li class="fzx-cat-item" th:each="cat : ${cats}">
            <a th:href="${cat.status.permalink}">
              <span th:text="${cat.spec.displayName}">分类</span>
              <span class="fzx-cat-count" th:text="${cat.status.postCount ?: 0}">0</span>
            </a>
          </li>
        </ul>
      </div>

    </aside>
  </th:block>

  <!-- ── Footer scripts ── -->
  <th:block th:fragment="footer">
    <script>
      // TOC is auto-generated by main.js after DOM ready
    </script>
  </th:block>

  <!-- ── Post Content ── -->
  <th:block th:fragment="content">
    <article class="fzx-post-wrap">

      <!-- Post Header -->
      <header class="fzx-post-header">

        <!-- Categories badges -->
        <div class="fzx-post-cats" th:if="${!#lists.isEmpty(post.categories)}">
          <a
            class="fzx-badge fzx-badge-primary"
            th:each="cat : ${post.categories}"
            th:href="${cat.status.permalink}"
            th:text="${cat.spec.displayName}"
          >分类</a>
        </div>

        <!-- Title -->
        <h1 class="fzx-post-title" th:text="${post.spec.title}">文章标题</h1>

        <!-- Meta bar -->
        <div class="fzx-post-meta-bar">

          <!-- Author -->
          <a
            th:unless="${#strings.isEmpty(post.owner.permalink)}"
            class="fzx-author-link"
            th:href="${post.owner.permalink}"
          >
            <img
              th:unless="${#strings.isEmpty(post.owner.avatar)}"
              class="fzx-author-avatar"
              th:src="${post.owner.avatar}"
              th:alt="${post.owner.displayName}"
            />
            <span th:text="${post.owner.displayName}">作者</span>
          </a>

          <!-- Publish date -->
          <span class="fzx-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span th:text="${#dates.format(post.spec.publishTime,'yyyy-MM-dd')}">日期</span>
          </span>

          <!-- Views -->
          <span class="fzx-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span th:text="${post.stats?.visit ?: 0}">0</span> 次浏览
          </span>

          <!-- Comment count -->
          <span class="fzx-meta-item" th:if="${haloCommentEnabled}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <a href="#comment" style="color:inherit;text-decoration:none"
               th:text="${post.stats?.comment ?: 0}">0</a> 条评论
          </span>

          <!-- Edit button (admin only) -->
          <a
            sec:authorize="isAuthenticated()"
            th:href="|/console/posts/editor?name=${post.metadata.name}&returnToView=true|"
            style="font-size:0.78rem;color:var(--text-muted);text-decoration:none;border:1px solid rgba(148,163,184,0.2);padding:0.15em 0.6em;border-radius:var(--radius-sm);transition:all 0.15s"
          >编辑</a>
        </div>
      </header>

      <!-- Article body -->
      <div class="fzx-post-content">
        <div
          id="fzx-post-content"
          class="fzx-prose"
          th:utext="${post.content.content}"
        ></div>
      </div>

      <!-- Tags -->
      <div class="fzx-post-tags-section" th:if="${!#lists.isEmpty(post.tags)}">
        <span class="fzx-post-tags-label">标签：</span>
        <a
          class="fzx-post-tag"
          th:each="tag : ${post.tags}"
          th:href="${tag.status.permalink}"
          th:text="'#' + ${tag.spec.displayName}"
        >#标签</a>
      </div>

      <!-- Reactions row — comment jump only -->
      <div class="fzx-post-reactions" th:if="${haloCommentEnabled}">
        <a class="fzx-reaction-btn" href="#comment">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span th:text="${post.stats?.comment ?: 0}">0</span> 条评论
        </a>
      </div>

      <!-- Prev / Next navigation -->
      <nav class="fzx-post-nav" th:with="cursor = ${postFinder.cursor(post.metadata.name)}">
        <a
          class="fzx-post-nav-item"
          th:if="${cursor.hasPrevious()}"
          th:href="${cursor.previous.status.permalink}"
        >
          <span class="fzx-post-nav-label">← 上一篇</span>
          <span class="fzx-post-nav-title" th:text="${cursor.previous.spec.title}">上一篇标题</span>
        </a>
        <div th:unless="${cursor.hasPrevious()}"></div>

        <a
          class="fzx-post-nav-item fzx-nav-next"
          th:if="${cursor.hasNext()}"
          th:href="${cursor.next.status.permalink}"
        >
          <span class="fzx-post-nav-label">下一篇 →</span>
          <span class="fzx-post-nav-title" th:text="${cursor.next.spec.title}">下一篇标题</span>
        </a>
        <div th:unless="${cursor.hasNext()}"></div>
      </nav>

      <!-- Comment section -->
      <div id="comment" class="fzx-comment-section" th:if="${haloCommentEnabled}">
        <h3 class="fzx-comment-heading">评论</h3>
        <halo:comment
          group="content.halo.run"
          kind="Post"
          th:attr="name=${post.metadata.name}"
        />
      </div>

    </article>
  </th:block>
</html>
