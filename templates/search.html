<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(
    title       = '搜索：' + ${keyword} + ' - ' + ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
    hero        = null,
    content     = ~{::content},
    head        = null,
    footer      = null,
    sidebar     = null,
    contentClass= null
  )}"
>
  <th:block
    th:fragment="content"
    th:with="normalizedKeyword = ${#strings.trim(keyword != null ? keyword : '')},
             keywordLower = ${#strings.toLowerCase(normalizedKeyword)},
             backendPosts = ${posts != null and posts.items != null ? posts.items : T(java.util.Collections).emptyList()},
             backendTotal = ${posts != null and posts.total != null ? posts.total : #lists.size(backendPosts)},
             useTitleFallback = ${#lists.size(backendPosts) == 0 and !#strings.isEmpty(keywordLower)},
             fallbackLimit = ${100},
             fallbackPage = ${useTitleFallback ? postFinder.list(1, fallbackLimit) : null},
             fallbackPosts = ${fallbackPage != null and fallbackPage.items != null ? fallbackPage.items : T(java.util.Collections).emptyList()},
             fallbackMatchedPosts = ${#strings.isEmpty(keywordLower) ? fallbackPosts : fallbackPosts.?[#strings.contains(#strings.toLowerCase(#this.spec.title), keywordLower)]},
             renderedPosts = ${useTitleFallback ? fallbackMatchedPosts : backendPosts},
             renderedTotal = ${useTitleFallback ? #lists.size(fallbackMatchedPosts) : backendTotal}"
  >

    <div class="fzx-page-hero">
      <h1 class="fzx-page-hero-title">搜索结果</h1>
      <p class="fzx-page-hero-desc">
        关键词：<span class="fzx-search-keyword" th:text="${normalizedKeyword}">...</span>
        &nbsp;·&nbsp;
        共 <span th:text="${renderedTotal}">0</span> 篇文章
      </p>
    </div>

    <div class="fzx-post-grid" th:if="${renderedTotal gt 0}">
      <th:block th:each="post : ${renderedPosts}">
        <th:block th:replace="~{modules/post-card :: post-card(${post})}" />
      </th:block>
    </div>

    <div class="fzx-empty" th:if="${renderedTotal == 0}">
      <div class="fzx-empty-icon">🔭</div>
      <p>未找到与 "<span th:text="${normalizedKeyword}">...</span>" 相关的文章</p>
      <a class="fzx-btn fzx-btn-ghost" th:href="@{/}" style="margin-top:1.5rem">
        返回首页
      </a>
    </div>

    <th:block
      th:if="${!useTitleFallback and posts != null and (posts.hasPrevious() or posts.hasNext())}"
      th:replace="~{modules/pagination :: pagination(
        context     = '/search?keyword=' + ${normalizedKeyword} + '&',
        prevUrl     = ${posts.prevUrl},
        nextUrl     = ${posts.nextUrl},
        totalPages  = ${posts.totalPages},
        page        = ${posts.page},
        hasPrevious = ${posts.hasPrevious()},
        hasNext     = ${posts.hasNext()}
      )}"
    />

  </th:block>
</html>
