<!doctype html>
<html xmlns:th="https://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{modules/base-head :: base-head(
      title = ${'注册 - ' + (!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title)}
    )}" />
  </head>
  <body class="fzx-login-page">
    <canvas id="fzx-starfield" aria-hidden="true"></canvas>

    <div class="fzx-login-shell"
         th:with="brandingTitle = ${!#strings.isEmpty(theme.config.branding.site_title) ? theme.config.branding.site_title : site.title},
                  brandingSubtitle = ${!#strings.isEmpty(theme.config.branding.site_subtitle) ? theme.config.branding.site_subtitle : site.subtitle},
                  brandingLogo = ${!#strings.isEmpty(theme.config.branding.logo_url) ? theme.config.branding.logo_url : site.logo}">
      <div class="fzx-login-card fzx-reveal">
        <div class="fzx-login-brand">
          <div class="fzx-login-avatar" th:if="${!#strings.isEmpty(brandingLogo)}">
            <img th:src="${brandingLogo}" th:alt="${brandingTitle}" loading="lazy" />
          </div>
          <div class="fzx-login-title" th:text="${brandingTitle}">FZX 方舟星系</div>
          <p class="fzx-login-subtitle" th:text="${#strings.defaultString(brandingSubtitle, '欢迎来到星港')}">
            欢迎来到星港
          </p>
        </div>

        <div class="fzx-login-alert fzx-login-alert--error" th:if="${param.containsKey('error')}">
          注册失败，请检查输入信息
        </div>

        <form class="fzx-login-form" th:action="@{/signup}" method="post">
          <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <label class="fzx-login-label" for="signup-username">用户名</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input id="signup-username" name="username" type="text" autocomplete="username" required pattern="[a-zA-Z0-9_-]+" title="只允许字母、数字、下划线和连字符" placeholder="输入用户名（字母或数字）" />
          </div>

          <label class="fzx-login-label" for="signup-email">邮箱</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input id="signup-email" name="email" type="email" autocomplete="email" required placeholder="输入邮箱地址" />
          </div>

          <label class="fzx-login-label" for="signup-displayname">昵称</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input id="signup-displayname" name="displayName" type="text" autocomplete="name" placeholder="输入昵称（可选）" />
          </div>

          <label class="fzx-login-label" for="signup-password">密码</label>
          <div class="fzx-login-field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" required minlength="6" placeholder="输入密码（至少6位）" />
          </div>

          <button class="fzx-btn fzx-btn-primary fzx-login-submit" type="submit">注册</button>
        </form>

        <div class="fzx-login-actions">
          <a class="fzx-login-link" th:href="@{/login}">← 返回登录</a>
          <a class="fzx-login-link" th:href="@{/}">← 返回首页</a>
        </div>
      </div>
    </div>
  </body>
</html>
